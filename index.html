<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretMsg Pro - Messages Anonymes Sécurisés</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Styles modernes et responsive */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c63ff;
            --secondary: #f50057;
            --success: #00c853;
            --warning: #ff9100;
            --dark: #1a1a2e;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        textarea.input-field {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b7fff);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--secondary), #ff4081);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #69f0ae);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid var(--primary);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-badge {
            background: var(--secondary);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            background: var(--success);
        }

        .notification.error {
            background: var(--secondary);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🔒 SecretMsg Pro</h1>
            <p>Messages anonymes avec analytics avancés</p>
        </header>

        <div class="stats-grid" id="statsContainer" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="totalMessages">0</div>
                <div class="stat-label">Messages totaux</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Utilisateurs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="messagesToday">0</div>
                <div class="stat-label">Aujourd'hui</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="blockedUsers">0</div>
                <div class="stat-label">Bloqués</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-paper-plane"></i>
                    Envoyer un message
                </div>
                <input type="text" class="input-field" id="senderName" placeholder="Votre nom (visible par l'admin)">
                <input type="email" class="input-field" id="senderEmail" placeholder="Votre email (optionnel)">
                <textarea class="input-field" id="messageContent" placeholder="Votre message anonyme..."></textarea>
                <button class="btn btn-primary" onclick="sendMessage()">
                    <i class="fas fa-lock"></i> Envoyer anonymement
                </button>
            </div>

            <div class="card">
                <div class="card-title">
                    <i class="fas fa-comments"></i>
                    Messages publics
                </div>
                <div id="publicMessages">
                    <p style="text-align: center; color: rgba(255,255,255,0.5);">
                        <i class="fas fa-inbox"></i> Aucun message
                    </p>
                </div>
            </div>
        </div>

        <div class="card hidden" id="adminPanel">
            <div class="card-title">
                <i class="fas fa-shield-alt"></i>
                Panneau d'administration
                <span class="admin-badge">ADMIN</span>
            </div>
            <div id="adminLogin">
                <input type="email" class="input-field" id="adminEmail" placeholder="Email admin">
                <input type="password" class="input-field" id="adminPassword" placeholder="Mot de passe">
                <button class="btn btn-success" onclick="adminLogin()">
                    <i class="fas fa-sign-in-alt"></i> Connexion admin
                </button>
            </div>
            <div id="adminContent" class="hidden">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-danger" onclick="logoutAdmin()">
                        <i class="fas fa-sign-out-alt"></i> Déconnexion
                    </button>
                    <button class="btn btn-danger" onclick="clearAllMessages()" style="margin-left: 10px;">
                        <i class="fas fa-trash"></i> Vider tout
                    </button>
                </div>
                <div id="adminMessages">
                    <p style="text-align: center; color: rgba(255,255,255,0.5);">
                        Chargement...
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // Configuration
        const API_URL = window.location.origin + '/api';
        let adminToken = localStorage.getItem('adminToken');
        let currentUser = null;

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            loadPublicMessages();
            
            if (adminToken) {
                checkAdminAuth();
            }
            
            // Vérifier si on est sur la page admin
            if (window.location.hash === '#admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
            }
        });

        // Fonctions API
        async function sendMessage() {
            const name = document.getElementById('senderName').value.trim();
            const email = document.getElementById('senderEmail').value.trim();
            const content = document.getElementById('messageContent').value.trim();

            if (!name || !content) {
                showNotification('Veuillez remplir le nom et le message', 'error');
                return;
            }

            try {
                const response = await axios.post(`${API_URL}/messages/send`, {
                    username: name,
                    email: email,
                    content: content
                }, {
                    headers: {
                        'X-Fingerprint': generateFingerprint()
                    }
                });

                showNotification('✅ Message envoyé avec succès!', 'success');
                
                // Réinitialiser le formulaire
                document.getElementById('senderName').value = '';
                document.getElementById('senderEmail').value = '';
                document.getElementById('messageContent').value = '';
                
                // Recharger les messages
                loadPublicMessages();
                
            } catch (error) {
                const message = error.response?.data?.error || 'Erreur lors de l\'envoi';
                showNotification(message, 'error');
            }
        }

        async function loadPublicMessages() {
            try {
                const response = await axios.get(`${API_URL}/messages/public`);
                displayPublicMessages(response.data.messages);
            } catch (error) {
                console.error('Erreur chargement messages:', error);
            }
        }

        function displayPublicMessages(messages) {
            const container = document.getElementById('publicMessages');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5);"><i class="fas fa-inbox"></i> Aucun message pour le moment</p>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message-bubble">
                    <p>${escapeHtml(msg.content)}</p>
                    <small style="color: rgba(255,255,255,0.5);">
                        <i class="far fa-clock"></i> ${new Date(msg.created_at).toLocaleString('fr-FR')}
                    </small>
                </div>
            `).join('');
        }

        async function adminLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            if (!email || !password) {
                showNotification('Veuillez remplir tous les champs', 'error');
                return;
            }

            try {
                const response = await axios.post(`${API_URL}/admin/login`, {
                    email: email,
                    password: password
                });

                adminToken = response.data.token;
                localStorage.setItem('adminToken', adminToken);
                
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                
                showNotification('✅ Connecté en tant qu\'admin', 'success');
                
                loadAdminMessages();
                loadAdminStats();
            } catch (error) {
                const message = error.response?.data?.error || 'Erreur de connexion';
                showNotification(message, 'error');
            }
        }

        async function checkAdminAuth() {
            try {
                const response = await axios.get(`${API_URL}/admin/messages`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                
                loadAdminMessages();
                loadAdminStats();
            } catch (error) {
                adminToken = null;
                localStorage.removeItem('adminToken');
            }
        }

        async function loadAdminMessages() {
            if (!adminToken) return;

            try {
                const response = await axios.get(`${API_URL}/admin/messages`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });

                displayAdminMessages(response.data.messages);
            } catch (error) {
                console.error('Erreur chargement messages admin:', error);
            }
        }

        function displayAdminMessages(messages) {
            const container = document.getElementById('adminMessages');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<p style="text-align: center;">Aucun message</p>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message-bubble" style="border-left-color: var(--secondary);">
                    <p><strong>Message:</strong> ${escapeHtml(msg.content)}</p>
                    <div style="margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                        <p><strong>👤 Expéditeur:</strong> ${escapeHtml(msg.sender_name)}</p>
                        <p><strong>📧 Email:</strong> ${escapeHtml(msg.sender_email || 'Non fourni')}</p>
                        <p><strong>🌐 IP:</strong> ${msg.ip_address}</p>
                        <p><strong>📍 Localisation:</strong> ${msg.geo_location || 'Non disponible'}</p>
                        <p><strong>🖥️ Navigateur:</strong> ${msg.browser_info}</p>
                        <p><strong>📱 Appareil:</strong> ${msg.device_info}</p>
                        <p><strong>🔑 Fingerprint:</strong> ${msg.fingerprint}</p>
                        <p><strong>📅 Inscrit le:</strong> ${new Date(msg.sender_registered_at).toLocaleString('fr-FR')}</p>
                        <p><strong>🕐 Dernière activité:</strong> ${new Date(msg.sender_last_active).toLocaleString('fr-FR')}</p>
                        ${msg.sender_blocked ? '<span class="admin-badge">🚫 BLOQUÉ</span>' : ''}
                    </div>
                    <div style="margin-top: 10px; display: flex; gap: 10px;">
                        <button class="btn btn-danger" onclick="toggleBlockUser(${msg.user_id})" style="font-size: 0.8em; padding: 5px 15px;">
                            ${msg.sender_blocked ? 'Débloquer' : 'Bloquer'}
                        </button>
                        <button class="btn btn-danger" onclick="deleteMessage(${msg.id})" style="font-size: 0.8em; padding: 5px 15px;">
                            Supprimer
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function loadAdminStats() {
            if (!adminToken) return;

            try {
                const response = await axios.get(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });

                const stats = response.data;
                document.getElementById('statsContainer').style.display = 'grid';
                document.getElementById('totalMessages').textContent = stats.total_messages;
                document.getElementById('totalUsers').textContent = stats.total_users;
                document.getElementById('messagesToday').textContent = stats.messages_today;
                document.getElementById('blockedUsers').textContent = stats.blocked_users;
            } catch (error) {
                console.error('Erreur chargement stats:', error);
            }
        }

        async function toggleBlockUser(userId) {
            if (!confirm('Confirmer le blocage/déblocage de cet utilisateur?')) return;

            try {
                await axios.post(`${API_URL}/admin/users/${userId}/toggle-block`, {}, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                showNotification('✅ Statut de l\'utilisateur mis à jour', 'success');
                loadAdminMessages();
                loadAdminStats();
            } catch (error) {
                showNotification('Erreur lors du blocage', 'error');
            }
        }

        async function deleteMessage(messageId) {
            if (!confirm('Supprimer ce message?')) return;

            try {
                await axios.delete(`${API_URL}/admin/messages/${messageId}`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                showNotification('✅ Message supprimé', 'success');
                loadAdminMessages();
                loadAdminStats();
            } catch (error) {
                showNotific
